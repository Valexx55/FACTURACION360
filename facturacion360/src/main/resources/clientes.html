<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Clientes | Facturación 360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top" aria-label="Navegación principal">
    <div class="container">
        <!-- Logo a la izquierda (por defecto) -->
        <a class="navbar-brand" href="index.html">Facturación 360</a>

        <!-- Esta clase es la que permite que el contenido se colapse y se alinee -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- ms-auto empuja este div completamente a la derecha -->
            <div class="navbar-nav ms-auto">
                <a class="nav-link " href="index.html">Inicio</a>
                <a class="nav-link active" href="clientes.html">Clientes</a>
                <a class="nav-link" href="facturas.html">Facturas</a>
            </div>
        </div>
    </div>
</nav>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Panel de Gestión de Clientes</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#clienteModal">Añadir Cliente</button>
        </div>

      <div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead class="table-primary-custom">
            <tr>
                <th scope="col">Nombre</th>
                <th scope="col">CIF</th>
                <th scope="col">Email</th>
                <th scope="col">Teléfono</th>
                <th scope="col" class="text-end">Acciones</th>
            </tr>
        </thead>
        
        <!-- El cuerpo de la tabla está vacío, JS lo llenará usando el template -->
        <tbody id="tabla-clientes">
        </tbody>
    </table>
</div>

<!-- Plantilla oculta (Template) -->
<template id="fila-cliente-template">
    <tr>
        <td class="cliente-nombre"></td>
        <td class="cliente-cif"></td>
        <td class="cliente-email"></td>
        <td class="cliente-telefono"></td>
        <td class="text-end">
            <button class="btn btn-sm text-primary" title="Ver"><i class="fa-solid fa-eye"></i></button>
            <button class="btn btn-sm text-primary" title="Editar"><i class="fa-solid fa-pencil"></i></button>
            <button class="btn btn-sm text-danger btn-eliminar" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
        </td>
    </tr>
</template>
               
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p>&copy; 2026 Facturación 360. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Modal -->
    <div class="modal fade" id="clienteModal" tabindex="-1" aria-labelledby="clienteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="clienteModalLabel">Gestionar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="formCliente">
                        <div class="mb-3">
                            <label for="nombreCliente" class="form-label">Nombre o Empresa</label>
                            <input type="text" class="form-control" id="nombreCliente" required>
                        </div>
                        <div class="mb-3">
                            <label for="emailCliente" class="form-label">Email</label>
                            <input type="email" class="form-control" id="emailCliente" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary-custom" onclick="guardarCliente()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 
</body>
</html>
